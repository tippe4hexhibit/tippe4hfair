# ── Core ────────────────────────────────────────────────────────────────────
fair_year        = "2026"
author           = "Tippecanoe County Exhibit Association"
copyright        = "Copyright &copy; {{< current_year >}} Tippecanoe County Exhibit Association. All rights reserved."
defaultDescription = "The Tippecanoe County 4-H Fair — July 17–25, 2026. Lafayette, Indiana."
defaultKeywords  = ["tippecanoe", "4-H", "fair", "lafayette", "indiana"]
images           = ["/img/sharing-default.png"]

# ── Logos ───────────────────────────────────────────────────────────────────
logo_on_white = "/img/logo.png"
logo_on_black = "/img/logo.png"

# ── Header / Search ─────────────────────────────────────────────────────────
sticky_header = true
show_search   = false

# ── CTA Buttons ─────────────────────────────────────────────────────────────
[main_cta]
  text = "Become a Sponsor"
  link = "/sponsorship/"

[footer_cta]
  text = "Donate Today"
  link = "/donate/"

# ── Accessibility ────────────────────────────────────────────────────────────
[accessibility]
  skip_text = "Skip to main content"

# ── Social Links ─────────────────────────────────────────────────────────────
[social_links]
  facebook  = "https://www.facebook.com/TippecanoeCounty4HFair"
  twitter   = "https://twitter.com/tippe4hfair"
  instagram = "https://www.instagram.com/tippe4hfair/"
