{{ if isset .Site.Params "nextyear" }}
    {{ if .Site.Params.nextyear.enable }}
    <section class="bar no-mb"  style="background-color: #004438;">
        <div class="container">
            <div class="row">
                <div class="col-md-12">
                    <div class="heading text-center">
                    </div>
                    <div class="text-center" style="margin-bottom:40px;">
                        <img src="/img/{{ .Params.fair_nextyear }}-fairlogo-OPT.svg" width="35%" alt="Tippecanoe County 4-H Fair {{ .Params.fair_nextyear_dates }} Logo" class="img-fluid">
                    </div>
                    <div class="heading text-center">
                        <p style="font-size:36pt;font-weight:bold;color:#ffffff;">
                            See you next year!
                            <br>
                            {{ .Params.fair_nextyear_dates}}
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>
    {{ end }}
{{ end }}
